- name: Hardware
  hosts: orangepi
  become: true

  tasks:

  - name: Device tree overlay
    copy:
      dest: "/tmp/i2s-sound.dts"
      content: |
        /dts-v1/;
        /plugin/;

        / {
          compatible = "allwinner,sun8i-h2-plus";

          fragment@0 { 
            target-path = "/"; 
            __overlay__ { 
              max98357a: max98357a {
              #sound-dai-cells = <0>;
              compatible = "maxim,max98357a";
              sdmode-gpios = <&pio 0 8 0>; /* PA8, active high */
              status = "okay";
              };
            }; 
          };

          fragment@1 {
            target = <&i2s0>;
            __overlay__ {
              status = "okay";
              pinctrl-0 = <&i2s0_pins>;
              sound-dai = <&max98357a>;
              pinctrl-names = "default";
            };
          };

          fragment@2 {
            target-path = "/";
            __overlay__ {
              sound_i2s {
                compatible = "simple-audio-card";
                simple-audio-card,name = "loud-orange-pi";
                simple-audio-card,mclk-fs = <256>;
                simple-audio-card,format = "i2s";
                            status = "okay";

                simple-audio-card,cpu {
                  sound-dai = <&i2s0>;
                };

                simple-audio-card,codec {
                  sound-dai = <&max98357a>;
                };
              };
            };
          };
        };

  - name: Install device tree overlay
    ansible.builtin.shell:
      cmd: armbian-add-overlay i2s-sound.dts
      chdir: /tmp

  # Disable HDMI audio output
  - name: Kernel module blacklist
    lineinfile:
      dest: /etc/modprobe.d/blacklist.conf
      create: true
      regexp: "{{ item.regexp }}"
      line: "{{ item.line }}"
    loop:
    - { regexp: '^blacklist snd_soc_hdmi_codec', line: 'blacklist snd_soc_hdmi_codec' }
    - { regexp: '^blacklist sun9i_hdmi_audio', line: 'blacklist sun9i_hdmi_audio' }
    - { regexp: '^blacklist dw_hdmi_i2s_audio', line: 'blacklist dw_hdmi_i2s_audio' }

  # Requires reboot due to hardware configuration changes
  - name: Reboot the machine (Wait for 5 min)
    reboot:
      reboot_timeout: 300